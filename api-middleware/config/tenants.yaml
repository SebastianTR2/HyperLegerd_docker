# tenants.example.yaml — Configuración multi-tenant del api-middleware (BaaS)
#
# Copiar a `config/tenants.yaml` y rellenar valores. NO commitear `tenants.yaml`
# con cert/llave reales: añadir al .gitignore.
#
# Activación: definir TENANTS_FILE=./config/tenants.yaml en el .env
# Si TENANTS_FILE no está definido o el archivo no existe, el middleware
# arranca en modo single-tenant legacy con las variables MSPID/CERT_PATH/...
#
# Cada tenant es una empresa con su propia cadena de bloques (canal Fabric)
# y al menos una API key por rol.
#
# default: id del tenant utilizado cuando una key no apunta a ningún tenant
# (compatibilidad con las claves legacy API_KEY_ADMIN / INTEGRADOR / SOLO_LECTURA).

default: clientes

tenants:
  clientes:
    nombre: "Empresa Demo (clientes)"
    descripcion: "Sistema base. Modelo tipado de Cliente sobre cliente_cc."
    msp_id: "Org1MSP"
    cert_path: "../red-hyperledger/test-network/organizations/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/signcerts/cert.pem"
    key_path_dir: "../red-hyperledger/test-network/organizations/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/keystore"
    tls_cert_path: "../red-hyperledger/test-network/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/tlscacerts/tls-localhost-7054-ca-org1.pem"
    peer_endpoint: "localhost:7051"
    peer_host_alias: "peer0.org1.example.com"
    canal: "clientes"
    chaincode: "cliente_cc"
    token_chaincode: "token_erc20"
    api_keys:
      "sec-admin": admin
      "sec-int": integrador
      "sec-lect": solo_lectura
    notificaciones:
      activado: true
      eventos:
        - cliente.creado
        - cliente.editado
        - cliente.dado_de_baja
      roles_actor:
        - integrador
      destinos:
        - tipo: email
          asunto: "[CampusChain] {tipo} en {tenant} (recurso={recurso})"
          destinatarios:
            - admin-clientes@empresa.com

  agricultura:
    nombre: "Administradora de Agricultura"
    descripcion: "Empresa externa. Modelo genérico (JSON libre) sobre dato_cc."
    msp_id: "Org2MSP"
    cert_path: "../red-hyperledger/test-network/organizations/peerOrganizations/org2.example.com/users/Admin@org2.example.com/msp/signcerts/cert.pem"
    key_path_dir: "../red-hyperledger/test-network/organizations/peerOrganizations/org2.example.com/users/Admin@org2.example.com/msp/keystore"
    tls_cert_path: "../red-hyperledger/test-network/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/tlscacerts/tls-localhost-8054-ca-org2.pem"
    peer_endpoint: "localhost:9051"
    peer_host_alias: "peer0.org2.example.com"
    canal: "agricultura"
    chaincode: "dato_cc"
    api_keys:
      "agri-admin-2026": admin
      "agri-int-2026": integrador
      "agri-lect-2026": solo_lectura
    notificaciones:
      activado: true
      eventos:
        - dato.creado
        - dato.editado
        - dato.eliminado
      roles_actor:
        - integrador
      destinos:
        - tipo: email
          asunto: "[Agricultura] {tipo} → {recurso}"
          destinatarios:
            - admin-agri@empresa.com
