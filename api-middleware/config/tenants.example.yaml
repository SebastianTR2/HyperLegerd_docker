# tenants.example.yaml — Configuración multi-tenant del api-middleware (BaaS)
#
# Copiar a `config/tenants.yaml` y rellenar valores. NO commitear `tenants.yaml`
# con cert/llave reales: añadir al .gitignore.
#
# Activación: definir TENANTS_FILE=./config/tenants.yaml en el .env
# Si TENANTS_FILE no está definido o el archivo no existe, el middleware
# arranca en modo single-tenant legacy con las variables MSPID/CERT_PATH/...
#
# Cada tenant es una empresa con su propia cadena de bloques (canal Fabric)
# y al menos una API key por rol.
#
# default: id del tenant utilizado cuando una key no apunta a ningún tenant
# (compatibilidad con las claves legacy API_KEY_ADMIN / INTEGRADOR / SOLO_LECTURA).

default: clientes

tenants:
  # ─────────────────────────────────────────────────────────────────────────
  # Tenant 1 — sistema original (Org1, canal `clientes`, cliente_cc).
  # ─────────────────────────────────────────────────────────────────────────
  clientes:
    nombre: "Empresa Demo (clientes)"
    descripcion: "Sistema base. Modelo tipado de Cliente sobre cliente_cc."
    # Identidad Fabric
    msp_id: "Org1MSP"
    cert_path: "/ruta/a/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/signcerts/cert.pem"
    key_path_dir: "/ruta/a/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/keystore"
    tls_cert_path: "/ruta/a/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt"
    peer_endpoint: "localhost:7051"
    peer_host_alias: "peer0.org1.example.com"
    # Canal y chaincode por defecto del tenant
    canal: "clientes"
    chaincode: "cliente_cc"
    token_chaincode: "token_erc20"  # opcional, solo si el tenant usa tokens
    # API keys → rol. Cada clave es ÚNICA en todo el archivo.
    api_keys:
      "sec-admin": admin
      "sec-int":   integrador
      "sec-lect":  solo_lectura
    # Notificaciones automáticas al administrador del tenant cuando un
    # actor realiza una mutación (crear/editar/dar de baja). Lista vacía
    # en `eventos` o `roles_actor` significa "todos".
    notificaciones:
      activado: true
      eventos:
        - cliente.creado
        - cliente.editado
        - cliente.dado_de_baja
      # Sólo avisar cuando un integrador (no administrador) hizo el cambio.
      roles_actor:
        - integrador
      destinos:
        - tipo: email
          asunto: "[CampusChain] {tipo} en {tenant} (recurso={recurso})"
          destinatarios:
            - admin-clientes@empresa.com
        # SSE es implícito: el portal admin se conecta a
        # GET /admin/notificaciones/stream con su X-API-Key de rol admin
        # y recibe los eventos en vivo de su tenant.
        # Opcional: webhook a Slack/Teams/n8n
        # - tipo: webhook
        #   url: https://hooks.slack.com/services/AAA/BBB/CCC
        #   token: "" # se envía como Authorization: Bearer <token>

  # ─────────────────────────────────────────────────────────────────────────
  # Tenant 2 — empresa Agricultura. Canal privado, chaincode genérico dato_cc.
  # ─────────────────────────────────────────────────────────────────────────
  agricultura:
    nombre: "Administradora de Agricultura"
    descripcion: "Empresa externa. Modelo genérico (JSON libre) sobre dato_cc."
    msp_id: "OrgAgriMSP"
    cert_path: "/ruta/a/peerOrganizations/orgagri.example.com/users/Admin@orgagri.example.com/msp/signcerts/cert.pem"
    key_path_dir: "/ruta/a/peerOrganizations/orgagri.example.com/users/Admin@orgagri.example.com/msp/keystore"
    tls_cert_path: "/ruta/a/peerOrganizations/orgagri.example.com/peers/peer0.orgagri.example.com/tls/ca.crt"
    peer_endpoint: "localhost:11051"
    peer_host_alias: "peer0.orgagri.example.com"
    canal: "agricultura"
    chaincode: "dato_cc"
    api_keys:
      "agri-admin-2026": admin
      "agri-int-2026":   integrador
      "agri-lect-2026":  solo_lectura
    notificaciones:
      activado: true
      eventos:
        - dato.creado
        - dato.editado
        - dato.eliminado
      roles_actor:
        - integrador
      destinos:
        - tipo: email
          asunto: "[Agricultura] {tipo} → {recurso}"
          destinatarios:
            - admin-agri@empresa.com
